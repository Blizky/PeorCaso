<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeorCaso</title>
  <link rel="stylesheet" href="colors.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="sticky-header" data-sticky-header>
      <div class="container">
        <div class="sticky-header__bar">
          <a class="sticky-header__title" href="#top">PeorCaso</a>

          <nav class="sticky-header__nav" aria-label="Category filters" data-sticky-nav></nav>

          <div class="sticky-header__actions">
            <div class="search-shell" data-search-shell>
              <button class="button button-secondary button-compact" type="button" data-search-toggle>
                Search
              </button>

              <label class="search-field" hidden data-search-field>
                <span class="visually-hidden">Search posts</span>
                <input
                  class="search-input"
                  type="search"
                  placeholder="Search posts"
                  autocomplete="off"
                  data-search-input
                >
              </label>
            </div>

            <div class="more-menu" data-more-menu>
              <button
                class="button button-secondary button-compact"
                type="button"
                aria-expanded="false"
                aria-controls="more-menu-panel"
                data-more-toggle
              >
                More
              </button>

              <div class="more-menu__panel" id="more-menu-panel" data-more-panel hidden></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <header class="site-header">
      <div class="container" id="top">
        <section class="hero" aria-label="Featured video">
          <div class="hero__logo">
            <img src="assets/images/PeorCaso_logo.png" alt="PeorCaso">
          </div>

          <div class="hero__media">
            <div class="media-frame">
              <iframe
                src="https://www.youtube.com/embed/ScMzIvxBSi4?rel=0"
                title="Latest YouTube video placeholder"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
              ></iframe>
            </div>
          </div>
        </section>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <nav class="button-row" aria-label="Content categories" data-category-row></nav>
        </div>
      </section>

      <section class="section" id="latest" aria-labelledby="grid-title">
        <div class="container">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Latest posts</p>
              <h2 id="grid-title">Content</h2>
            </div>
            <p class="section-heading__text" data-results-copy>Loading posts from the database.</p>
          </div>

          <div class="card empty-state" data-empty-state hidden>
            <h3>No posts found</h3>
            <p>Try a different category or search term, or add content from the admin page.</p>
          </div>

          <div class="card-grid" data-card-grid></div>

          <div class="grid-actions">
            <button class="button button-secondary" type="button" data-see-more hidden>
              See more
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-layout">
        <p>PeorCaso</p>
        <p><a href="/admin.html">Admin</a></p>
      </div>
    </footer>
  </div>

  <script type="module" src="site.js"></script>
</body>
</html>
